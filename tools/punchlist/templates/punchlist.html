<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Unit Turn Punchlist — Doss &amp; Spaulding</title>
<style>
  :root{--accent:#a78147;--accent-dark:#8f6c3c;--sub:#efe7d9;--gray:#666;--line:#e6e0d6;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:#f7f5f1;color:#1a1a1a}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px}
  .topbar img{height:30px}
  .topbar a{color:var(--accent-dark);text-decoration:none;font-size:13px;font-weight:600}
  .topbar .sp{flex:1}
  header.h{background:var(--accent);color:#fff;padding:16px}
  header.h h1{font-size:18px;margin:0}
  header.h p{margin:4px 0 0;font-size:12px;opacity:.9}
  main{max-width:640px;margin:0 auto;padding:16px}
  label{display:block;font-weight:600;font-size:14px;margin:16px 0 6px}
  .hint{font-weight:400;color:var(--gray);font-size:12px}
  input[type=text],textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff}
  textarea{min-height:150px;resize:vertical;line-height:1.4}
  .photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:10px}
  .ph{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;position:relative}
  .ph img{width:100%;height:90px;object-fit:cover;display:block}
  .ph .x{position:absolute;top:3px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:0;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;line-height:1}
  .toggle{display:flex;font-size:12px}
  .toggle button{flex:1;border:0;padding:7px 0;background:#f0ece4;color:#775f38;cursor:pointer}
  .toggle button.on{background:var(--accent);color:#fff;font-weight:600}
  .addbtn{margin-top:10px;display:inline-block;background:var(--sub);color:var(--accent-dark);
    border:1px dashed var(--accent);border-radius:10px;padding:12px 16px;font-weight:600;cursor:pointer;font-size:14px}
  .or{color:var(--gray);font-size:12px;margin:8px 0 0}
  #go{width:100%;margin-top:22px;background:var(--accent);color:#fff;border:0;border-radius:12px;padding:16px;font-size:17px;font-weight:700;cursor:pointer}
  #go:disabled{opacity:.6}
  #result{margin-top:22px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;display:none}
  .dl{display:flex;gap:10px;margin-top:12px}
  .dl a{flex:1;text-align:center;text-decoration:none;background:var(--accent);color:#fff;padding:14px;border-radius:10px;font-weight:700}
  .sum{font-size:13px;color:#333;margin-top:6px}
  .warn{background:#fbf3e2;border:1px solid #e6cfa0;color:#7a5b1a;padding:10px;border-radius:8px;font-size:12px;margin-top:10px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <a href="/"><img src="/static/logo.png" alt="Doss &amp; Spaulding"></a>
  <span class="sp"></span>
  <a href="/">&larr; All tools</a>
</div>
<header class="h">
  <h1>Unit Turn Punchlist Generator</h1>
  <p>Doss &amp; Spaulding Properties</p>
</header>
<main>
  <label>Property address <span class="hint">e.g. 4109 Beckford Dr</span></label>
  <input id="address" type="text" placeholder="Property address">

  <label>Checklist <span class="hint">Type it below, one item per line — or add a photo of a written/on-screen checklist and it will be read for you. You can do both. Note anything already done.</span></label>
  <textarea id="checklist" placeholder="Missing/broken window latches (4 - downstairs front window, 2 in den...)
Replace broken blind in primary bedroom (39-40 inch)
Basement back door does not latch smoothly
Weed flower beds and freshen with pine needles
Smoke detectors (3) - completed while at property"></textarea>
  <p class="or">or</p>
  <label class="addbtn" for="clfiles">+ Add photo of checklist</label>
  <input id="clfiles" type="file" accept="image/*" multiple style="display:none">
  <div class="photos" id="clphotos"></div>

  <label>Property photos <span class="hint">Add photos of the work, then tap Inside or Outside for each. Inside photos go at the end of the Interior section, Outside at the end of Exterior.</span></label>
  <label class="addbtn" for="filein">+ Add property photos</label>
  <input id="filein" type="file" accept="image/*" multiple style="display:none">
  <div class="photos" id="photos"></div>

  <button id="go">Generate punchlist</button>
  <div id="result"></div>
</main>

<script>
let items=[]; let clItems=[];
const photosEl=document.getElementById('photos');
const clEl=document.getElementById('clphotos');
async function toStored(f){
  const buf=await f.arrayBuffer(); const type=f.type||'image/jpeg';
  const name=f.name||('photo_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.jpg');
  return {blob:new Blob([buf],{type}), name};
}
document.getElementById('filein').addEventListener('change',async e=>{
  const files=[...e.target.files]; e.target.value='';
  for(const f of files){ const s=await toStored(f); items.push({...s,tag:'interior'}); render(); }
});
document.getElementById('clfiles').addEventListener('change',async e=>{
  const files=[...e.target.files]; e.target.value='';
  for(const f of files){ const s=await toStored(f); clItems.push(s); renderCl(); }
});
function render(){
  photosEl.innerHTML='';
  items.forEach((it,i)=>{
    const d=document.createElement('div'); d.className='ph';
    const img=document.createElement('img'); img.src=URL.createObjectURL(it.blob); d.appendChild(img);
    const x=document.createElement('button'); x.className='x'; x.textContent='×'; x.onclick=()=>{items.splice(i,1);render()}; d.appendChild(x);
    const t=document.createElement('div'); t.className='toggle';
    const bi=document.createElement('button'); bi.textContent='Inside';
    const bo=document.createElement('button'); bo.textContent='Outside';
    (it.tag==='interior'?bi:bo).classList.add('on');
    bi.onclick=()=>{it.tag='interior';render()}; bo.onclick=()=>{it.tag='exterior';render()};
    t.appendChild(bi); t.appendChild(bo); d.appendChild(t); photosEl.appendChild(d);
  });
}
function renderCl(){
  clEl.innerHTML='';
  clItems.forEach((it,i)=>{
    const d=document.createElement('div'); d.className='ph';
    const img=document.createElement('img'); img.src=URL.createObjectURL(it.blob); d.appendChild(img);
    const x=document.createElement('button'); x.className='x'; x.textContent='×'; x.onclick=()=>{clItems.splice(i,1);renderCl()}; d.appendChild(x);
    clEl.appendChild(d);
  });
}
document.getElementById('go').onclick=async()=>{
  const address=document.getElementById('address').value.trim();
  const checklist=document.getElementById('checklist').value.trim();
  const res=document.getElementById('result');
  if(!checklist && clItems.length===0){res.style.display='block';res.innerHTML='<b>Type a checklist or add a photo of one.</b>';return;}
  const btn=document.getElementById('go'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Generating…';
  const fd=new FormData();
  fd.append('address',address); fd.append('checklist',checklist);
  clItems.forEach(it=>fd.append('checklist_images',it.blob,it.name));
  items.forEach(it=>{ fd.append('photos',it.blob,it.name); fd.append('tags',it.tag); });
  try{
    const r=await fetch('generate',{method:'POST',body:fd});
    const j=await r.json();
    if(!r.ok){throw new Error(j.error||'Generation failed');}
    let html='<b>Punchlist ready.</b><div class="dl">';
    html+=`<a href="download/${j.job}/docx">Download Word (.docx)</a></div>`;
    j.sections.forEach(s=>{
      const subs=s.subs.map(x=>`${x.name} (${x.count})`).join(', ');
      html+=`<div class="sum"><b>${s.name}</b>: ${subs||'—'} &middot; ${s.photos} photo(s)</div>`;
    });
    html+='<div class="sum" style="color:#666;margin-top:8px">Need a PDF? Open the file and choose File &rarr; Save As / Print &rarr; PDF.</div>';
    if(j.mode==='fallback') html+='<div class="warn">Server has no AI key set, so tasks were only lightly organized and checklist photos can\'t be read. Add ANTHROPIC_API_KEY for full grouping, cleanup &amp; photo reading.</div>';
    res.innerHTML=html; res.style.display='block';
  }catch(e){ res.innerHTML='<b>Error:</b> '+e.message; res.style.display='block'; }
  btn.disabled=false; btn.textContent='Generate punchlist';
};
</script>
</body>
</html>
